kind = "web"
previewPath = "/"
title = "Лучшие Telegram Боты"
version = "1.0.0"
id = "artifacts/tg-bots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21880

[services.development]
run = "pnpm --filter @workspace/tg-bots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tg-bots", "run", "build" ]
run = "pnpm --filter @workspace/tg-bots run start"

[services.env]
PORT = "21880"
