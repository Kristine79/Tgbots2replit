openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Telegram Bots Directory
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bots
    description: Telegram bots directory
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bots
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [rating, name, popular]
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get bot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /categories:
    get:
      operationId: listCategories
      tags: [bots]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Bot:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categoryId:
          type: integer
        rating:
          type: number
          format: float
        reviewCount:
          type: integer
        isVerified:
          type: boolean
        isPremium:
          type: boolean
        tags:
          type: array
          items:
            type: string
        monthlyUsers:
          type: integer
        iconEmoji:
          type: string
        telegramUrl:
          type: string
      required:
        - id
        - username
        - name
        - description
        - category
        - categoryId
        - rating
        - reviewCount
        - isVerified
        - isPremium
        - tags
        - monthlyUsers
        - iconEmoji
        - telegramUrl
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        emoji:
          type: string
        count:
          type: integer
      required:
        - id
        - name
        - slug
        - emoji
        - count
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
